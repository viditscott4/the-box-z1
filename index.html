<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE BOX Z1 | Official Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --brand-yellow: #fff2ad; 
            --brand-blue: #4455f0; 
            --brand-red: #e31225;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }

        /* --- CUSTOM CURSOR --- */
        #cursor { position: fixed; width: 8px; height: 8px; background: #fff; border-radius: 50%; pointer-events: none; z-index: 10000; mix-blend-mode: difference; }
        #cursor-follower { position: fixed; width: 40px; height: 40px; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50%; pointer-events: none; z-index: 9999; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* --- NAV --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 1.5rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo { font-family: 'Syncopate'; font-weight: 700; letter-spacing: 5px; font-size: 0.9rem; text-decoration: none; color: #fff; }
        .nav-links a { margin-left: 2rem; text-decoration: none; color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .nav-links a:hover { color: var(--brand-yellow); }

        /* --- HERO --- */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; }
        h1 { font-family: 'Syncopate'; font-size: clamp(3rem, 10vw, 8rem); line-height: 0.9; margin-bottom: 20px; }
        .hero p { color: var(--brand-yellow); letter-spacing: 10px; font-size: 0.9rem; margin-bottom: 40px; }

        /* --- GALLERY --- */
        section { padding: 100px 10%; }
        .section-title { margin-bottom: 60px; }
        .section-title h2 { font-family: 'Syncopate'; font-size: 2.5rem; margin-bottom: 10px; }
        .section-title div { width: 50px; height: 4px; background: var(--brand-blue); }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-auto-rows: 400px;
            gap: 20px;
        }
        .gallery-item { 
            position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        .gallery-item img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 0.8s cubic-bezier(0.2, 1, 0.2, 1);
            filter: grayscale(100%) brightness(0.7);
        }
        .gallery-item:hover img { transform: scale(1.1); filter: grayscale(0%) brightness(1); }
        .gallery-item:hover { border-color: var(--brand-yellow); }

        /* --- JOIN US FORM --- */
        .join-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 50px;
            background: var(--card-bg); padding: 60px; border-radius: 2px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .join-info h3 { font-size: 2rem; margin-bottom: 20px; color: var(--brand-yellow); }
        .join-info p { color: var(--text-dim); margin-bottom: 20px; line-height: 1.8; }
        
        input, textarea {
            width: 100%; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; color: #fff; margin-bottom: 20px; font-family: inherit;
        }
        input:focus { outline: none; border-color: var(--brand-blue); }
        .btn {
            padding: 15px 40px; background: #fff; color: #000; border: none;
            font-family: 'Syncopate'; font-weight: 700; font-size: 0.8rem;
            cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: var(--brand-yellow); transform: translateY(-3px); }

        /* --- FOOTER --- */
        footer { padding: 50px 10%; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; color: var(--text-dim); font-size: 0.8rem; letter-spacing: 3px; }

        .reveal { opacity: 0; transform: translateY(30px); }

        @media (max-width: 768px) {
            .join-container { grid-template-columns: 1fr; padding: 30px; }
            h1 { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="cursor-follower"></div>

    <nav>
        <a href="#" class="logo">BOX Z1</a>
        <div class="nav-links">
            <a href="#gallery">Gallery</a>
            <a href="#join">Join</a>
        </div>
    </nav>

    <div class="hero">
        <p class="reveal">GEOMETRIC EVOLUTION</p>
        <h1 class="reveal">THE FUTURE<br>IS BOXED.</h1>
    </div>

    <section id="gallery">
        <div class="section-title reveal">
            <h2>GALLERY</h2>
            <div></div>
        </div>
        <div class="gallery-grid">
            <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=800&q=80" alt="Architecture"></div>
            <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1511447333015-45b65e60f6d5?auto=format&fit=crop&w=800&q=80" alt="Digital"></div>
            <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80" alt="Nature"></div>
            <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=800&q=80" alt="Office"></div>
        </div>
    </section>

    <section id="join">
        <div class="join-container reveal">
            <div class="join-info">
                <h3>BECOME Z1</h3>
                <p>We are looking for pioneers to test the stability of the Z1 framework. Access is limited to 100 nodes per cycle.</p>
                <p style="font-size: 0.8rem; color: var(--brand-blue);">● SYSTEM STATUS: ONLINE</p>
            </div>
            <form onsubmit="event.preventDefault(); alert('Transmission Sent. Wait for verification.');">
                <input type="text" placeholder="NODE NAME" required>
                <input type="email" placeholder="ENCRYPTED EMAIL" required>
                <textarea rows="4" placeholder="PURPOSE OF ACCESS"></textarea>
                <button type="submit" class="btn">CONNECT TO NETWORK</button>
            </form>
        </div>
    </section>

    <footer>
        &copy; 2024 THE BOX Z1 PROJECT // 40.7128° N, 74.0060° W
    </footer>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Cursor
        const cursor = document.getElementById('cursor');
        const follower = document.getElementById('cursor-follower');
        document.addEventListener('mousemove', e => {
            gsap.to(cursor, {x: e.clientX, y: e.clientY, duration: 0});
            gsap.to(follower, {x: e.clientX - 20, y: e.clientY - 20, duration: 0.1});
        });

        // Reveals
        document.querySelectorAll('.reveal').forEach(el => {
            gsap.to(el, {
                scrollTrigger: { trigger: el, start: "top 85%" },
                opacity: 1, y: 0, duration: 1.2, ease: "power4.out"
            });
        });

        // Hover Effect for Cursor
        document.querySelectorAll('a, .btn, .gallery-item').forEach(el => {
            el.addEventListener('mouseenter', () => gsap.to(follower, {scale: 1.5, borderColor: '#fff2ad'}));
            el.addEventListener('mouseleave', () => gsap.to(follower, {scale: 1, borderColor: 'rgba(255,255,255,0.2)'}));
        });
    </script>
</body>
</html>
